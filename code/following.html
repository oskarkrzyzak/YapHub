<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YapHub - Following</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="feed-page">
    <!-- Header -->
    <header class="feed-header">
        <div class="header-content">
            <!-- Left: Logo -->
            <div class="header-left">
                <img src="images/logo.png" alt="YapHub Logo" class="header-logo">
            </div>

            <!-- Center: Title -->
            <div class="header-center">
                <h1 class="header-title">YapHub</h1>
            </div>

            <!-- Right: User -->
            <div class="header-right">
                <div class="header-profile">
                    <a href="myprofile.html" class="profile-avatar-link">
                        <div class="profile-avatar"></div>
                    </a>
                    <span class="header-nickname">myNickname</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Feed Layout -->
    <div class="feed-layout">
        <!-- Left Sidebar -->
        <aside class="feed-sidebar-left">
            <div class="nav-links">
                <a href="feed.html" class="nav-link">Home</a>
                <a href="following.html" class="nav-link active">Following</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="myprofile.html" class="nav-link">Profile</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
            <button class="post-btn" onclick="window.location.href='createPost.html'">Post</button>
        </aside>

        <!-- Center Content -->
        <main class="feed-main">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search...">
            </div>
            <div class="feed-content">
                <div class="post-card">
                    <!-- Post Header -->
                    <div class="post-header">
                        <div class="post-header-left">
                            <span class="post-nickname">Nickname</span>
                        </div>
                        <div class="post-header-right">
                            <span class="post-time">24h</span>
                        </div>
                    </div>

                    <!-- Post Content -->
                    <div class="post-body">
                        <p class="post-text">Post Content</p>
                    </div>

                    <!-- Post Actions -->
                    <div class="post-actions">
                        <button class="post-action-btn">👍 Like</button>
                        <button class="post-action-btn">💬 Comment</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="feed-sidebar-right">
            <div class="right-sidebar-placeholder">
                <p>Future features</p>
            </div>
        </aside>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
