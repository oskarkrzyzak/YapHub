<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YapHub - Edit Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="feed-page">
    <!-- Header -->
    <header class="feed-header">
        <div class="header-content">
            <!-- Left: Logo -->
            <div class="header-left">
                <img src="images/logo.png" alt="YapHub Logo" class="header-logo">
            </div>

            <!-- Center: Title -->
            <div class="header-center">
                <h1 class="header-title">YapHub</h1>
            </div>

            <!-- Right: User -->
            <div class="header-right">
                <div class="header-profile">
                    <a href="myprofile.html" class="profile-avatar-link">
                        <div class="profile-avatar"></div>
                    </a>
                    <span class="header-nickname">myNickname</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Feed Layout -->
    <div class="feed-layout">
        <!-- Left Sidebar -->
        <aside class="feed-sidebar-left">
            <div class="nav-links">
                <a href="feed.html" class="nav-link">Home</a>
                <a href="following.html" class="nav-link">Following</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="myprofile.html" class="nav-link active">Profile</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
            <button class="post-btn" onclick="window.location.href='createPost.html'">Post</button>
        </aside>

        <!-- Center Content -->
        <main class="feed-main">
            <div class="profile-form">
                <!-- Description Field -->
                <div class="profile-row">
                    <textarea class="profile-input profile-textarea" placeholder="Description"></textarea>
                </div>

                <!-- First Name + Last Name -->
                <div class="profile-row profile-row-two">
                    <input type="text" class="profile-input" placeholder="First Name">
                    <input type="text" class="profile-input" placeholder="Last Name">
                </div>

                <!-- Nickname Field -->
                <div class="profile-row">
                    <input type="text" class="profile-input" placeholder="Nickname">
                </div>

                <!-- Email Field -->
                <div class="profile-row">
                    <input type="email" class="profile-input" placeholder="Email">
                </div>

                <!-- Password Field -->
                <div class="profile-row">
                    <input type="password" class="profile-input" placeholder="Password">
                </div>

                <!-- Action Buttons -->
                <div class="profile-actions">
                    <button class="btn btn-save">Save All Changes</button>
                    <a href="myprofile.html" class="btn btn-cancel">Cancel</a>
                </div>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="feed-sidebar-right">
            <div class="right-sidebar-placeholder">
                <p>Future features</p>
            </div>
        </aside>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
